<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#00c3ff" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#0c0c0c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topbar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0c0c0c"/>
      <stop offset="30%" stop-color="#00c3ff"/>
      <stop offset="70%" stop-color="#00c3ff"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0c0c0c"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#282828" stroke-width="2"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#topbar)"/>

  <!-- === CENTER CONTENT (safe within 200–1000px x) === -->

  <!-- Logo row -->
  <circle cx="534" cy="192" r="9" fill="#00c3ff"/>
  <circle cx="534" cy="192" r="16" fill="#00c3ff" opacity="0.15"/>
  <text x="552" y="199" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="700" fill="#f0f0f0" letter-spacing="0.3">Agent Wiki</text>

  <!-- Badge -->
  <rect x="456" y="220" width="290" height="28" rx="14" fill="rgba(0,195,255,0.12)" stroke="rgba(0,195,255,0.28)" stroke-width="1"/>
  <circle cx="475" cy="234" r="4" fill="#00c3ff"/>
  <text x="487" y="239" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#00c3ff" letter-spacing="1.8">FREE OPEN-SOURCE TEMPLATE</text>

  <!-- Headline line 1 -->
  <text x="600" y="318" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="52" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-1.2">Give your AI a memory</text>

  <!-- Headline line 2 -->
  <text x="600" y="382" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="52" font-weight="700" fill="#00c3ff" text-anchor="middle" letter-spacing="-1.2">of how your team works.</text>

  <!-- Sub -->
  <text x="600" y="436" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" fill="#666666" text-anchor="middle">One setup run. Full context. Every morning.</text>

  <!-- Divider -->
  <line x1="360" y1="466" x2="840" y2="466" stroke="#282828" stroke-width="1"/>

  <!-- Source pills — centered row -->
  <rect x="256" y="483" width="88" height="32" rx="7" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <text x="300" y="504" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#777" text-anchor="middle">Slack</text>

  <rect x="358" y="483" width="96" height="32" rx="7" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <text x="406" y="504" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#777" text-anchor="middle">Notion</text>

  <rect x="468" y="483" width="136" height="32" rx="7" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <text x="536" y="504" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#777" text-anchor="middle">Claude Code</text>

  <rect x="618" y="483" width="122" height="32" rx="7" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <text x="679" y="504" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#777" text-anchor="middle">Apple Notes</text>

  <rect x="754" y="483" width="88" height="32" rx="7" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <text x="798" y="504" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#777" text-anchor="middle">+ more</text>

  <!-- Bottom URL -->
  <text x="600" y="592" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" fill="#383838" text-anchor="middle" letter-spacing="0.3">agent-wiki-template.vercel.app</text>
